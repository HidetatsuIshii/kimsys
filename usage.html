<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>パーツカタログ利用管理 - アライ電機</title>
    <style>
        :root {
            --primary-bg: #f4f7f6;
            --header-green: #9edb85; 
            --border-color: #999;
            --row-even: #f9f9f9;
            --text-red: #d32f2f;
        }

        body {
            font-family: sans-serif;
            background-color: var(--primary-bg);
            margin: 0;
            padding: 20px;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 10px;
            color: #0066cc;
            text-decoration: none;
        }

        /* ユーザー情報バー */
        .user-info-bar {
            text-align: right;
            font-size: 0.85rem;
            margin-bottom: 10px;
            color: #555;
        }

        /* 上部メニューボタン */
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .menu-btn {
            background-color: var(--header-green);
            border: 1px solid #777;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        }

        .menu-btn:hover { background-color: #8cc974; }
        .menu-btn .icon { font-size: 40px; display: block; margin-bottom: 5px; }

        /* 利用表 */
        .table-container {
            background: white;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
        }

        th {
            background-color: #e0e0e0;
            border: 1px solid var(--border-color);
            padding: 8px;
            text-align: center;
        }

        td {
            border: 1px solid var(--border-color);
            padding: 8px;
        }

        .col-num { width: 40px; text-align: center; color: #666; }
        .col-name { width: 220px; background: #fff; }
        .col-user { width: 150px; text-align: center; font-weight: bold; cursor: pointer; }

        .is-using { color: var(--text-red); }
        tr:nth-child(even) { background-color: var(--row-even); }

        .status-badge {
            font-size: 0.8rem;
            padding: 2px 6px;
            border-radius: 10px;
            margin-left: 5px;
        }
        .status-free { background: #e0e0e0; color: #666; }
        .status-busy { background: #ffebee; color: var(--text-red); }
    </style>
</head>
<body>

    <div class="user-info-bar">
        ログイン中: <strong id="display-user-name"></strong> さん
    </div>

    <a href="index.html" class="back-link">← メインメニューに戻る</a>

    <div class="menu-grid">
        <div class="menu-btn">
            <span class="icon">📋</span>
            <strong>利用表</strong>
        </div>
        <div class="menu-btn" style="opacity: 0.6;">
            <span class="icon">🗄️</span>
            <strong>一覧管理</strong>
        </div>
    </div>

    <h3>パーツカタログ利用表</h3>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>表示順</th>
                    <th>検索ツール名</th>
                    <th>受注者</th>
                </tr>
            </thead>
            <tbody id="usage-body">
                <tr><td colspan="3" style="text-align:center; padding:20px;">読み込み中...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        const AUTO_LOGOUT_TIME = 10 * 60 * 1000; // 10分
        const HEARTBEAT_INTERVAL = 2 * 60 * 1000; // 2分

        // ページ読み込み時のチェック
        (function() {
            const userName = localStorage.getItem('userName');
            const sessionId = localStorage.getItem('sessionId');
            
            if (!userName || !sessionId) {
                alert("セッションが切れたか、ログインしていません。");
                window.location.href = 'index.html';
                return;
            }

            document.getElementById('display-user-name').innerText = userName;
            startMonitoring();
        })();

        function startMonitoring() {
            // アクティビティ記録の初期化
            localStorage.setItem('lastActivity', Date.now());

            // 操作検知（マウス移動、キー入力など）
            ['mousedown', 'keydown', 'touchstart', 'mousemove'].forEach(event => {
                window.addEventListener(event, () => {
                    localStorage.setItem('lastActivity', Date.now());
                });
            });

            // 10分無操作チェック
            setInterval(() => {
                const lastActive = localStorage.getItem('lastActivity');
                if (Date.now() - lastActive > AUTO_LOGOUT_TIME) {
                    alert("10分間操作がなかったため、自動ログアウトしました。");
                    handleLogout();
                }
            }, 10000);

            // GASへ「利用中」を定期通知
            setInterval(async () => {
                const sid = localStorage.getItem('sessionId');
                if (sid && typeof GAS_URL !== 'undefined') {
                    try {
                        await fetch(`${GAS_URL}?action=heartbeat&sessionId=${sid}`);
                    } catch(e) { console.error("Heartbeat error"); }
                }
            }, HEARTBEAT_INTERVAL);
        }

        async function handleLogout() {
            const sid = localStorage.getItem('sessionId');
            if (sid && typeof GAS_URL !== 'undefined') {
                await fetch(`${GAS_URL}?action=logout&sessionId=${sid}`).catch(()=>{});
            }
            localStorage.clear();
            window.location.href = 'index.html';
        }
    </script>

    <script src="usage.js"></script>
</body>
</html>
