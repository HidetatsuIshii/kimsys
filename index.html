<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アプリ総合窓口 - アライ電機</title>
    <style>
        :root {
            --primary-bg: #f4f7f6;
            --card-bg: #ffffff;
            --accent-color: #a084ca; 
            --text-main: #333;
            --text-sub: #666;
            --border-color: #ddd;
        }

        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* ログインセクション */
        #login-section {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 80vh;
        }

        .login-box {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 350px;
            text-align: center;
        }

        .login-box input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 10px;
        }

        /* メニューセクション */
        #menu-section {
            display: none;
        }

        .search-panel {
            background-color: #fff9c4;
            border: 1px solid var(--border-color);
            padding: 15px;
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: 80px 1fr 1fr 100px;
            gap: 10px;
            align-items: center;
        }

        .search-panel input { padding: 8px; border: 1px solid #ccc; }

        .btn-clear {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 8px;
            cursor: pointer;
            border-radius: 4px;
        }

        .app-list { display: flex; flex-direction: column; gap: 10px; }

        .app-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 10px 15px;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
        }

        .app-card:hover { background-color: #f0f0f0; }

        .app-icon { width: 50px; height: 50px; background: #eee; margin-right: 20px; display: flex; align-items: center; justify-content: center; font-size: 24px; }

        .app-info { flex-grow: 1; }
        .app-title { font-weight: bold; font-size: 1.1rem; }
        .app-meta { display: flex; gap: 40px; font-size: 0.9rem; color: var(--text-sub); }

        /* ユーザー情報エリア */
        .user-info-bar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-bottom: 10px;
            font-size: 0.9rem;
            gap: 10px;
        }

        .logout-link {
            color: #d32f2f;
            text-decoration: underline;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="login-section">
        <div class="login-box">
            <h3>社内システム ログイン</h3>
            <p id="login-msg" style="color: red; font-size: 0.8rem;"></p>
            <input type="text" id="login-id" placeholder="社員番号">
            <input type="password" id="login-pw" placeholder="パスワード">
            <button class="btn-login" onclick="login()">ログイン</button>
        </div>
    </div>

    <div id="menu-section">
        <div class="user-info-bar">
            <span>ログイン中: <strong id="display-user-name"></strong> さん</span>
            <span class="logout-link" onclick="handleLogout()">ログアウト</span>
        </div>
        <h2>アプリ総合窓口</h2>

        <div class="search-panel">
            <div>検索窓口</div>
            <input type="text" placeholder="アプリ名">
            <input type="text" placeholder="五十音/ジャンル">
            <button class="btn-clear">条件削除</button>
        </div>

        <div class="app-list">
            <a href="#" class="app-card">
                <div class="app-icon">📊</div>
                <div class="app-info">
                    <div class="app-title">ITS価格表</div>
                    <div class="app-meta">
                        <span>あ行</span>
                        <span>業務効率化</span>
                    </div>
                </div>
            </a>
            <a href="#" class="app-card">
                <div class="app-icon">📓</div>
                <div class="app-info">
                    <div class="app-title">顧客ノート</div>
                    <div class="app-meta">
                        <span>か行</span>
                        <span>集計/分析</span>
                    </div>
                </div>
            </a>
            <a href="usage.html" class="app-card">
                <div class="app-icon">📚</div>
                <div class="app-info">
                    <div class="app-title">パーツカタログ利用管理</div>
                    <div class="app-meta">
                        <span>は行</span>
                        <span>タスク管理</span>
                    </div>
                </div>
            </a>
        </div>
    </div>
</div>

<script src="login.js"></script>
<script>
    const AUTO_LOGOUT_TIME = 10 * 60 * 1000; // 10分
    const HEARTBEAT_INTERVAL = 2 * 60 * 1000; // 2分ごとにGASへ通知

    window.onload = function() {
        const userName = localStorage.getItem('userName');
        const sessionId = localStorage.getItem('sessionId');
        
        if (userName && sessionId) {
            showMenu(userName);
            startMonitoring();
        }
    };

    function showMenu(name) {
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('menu-section').style.display = 'block';
        document.getElementById('display-user-name').innerText = name;
    }

    // 監視・維持機能の開始
    function startMonitoring() {
        // 最終操作時間を記録
        localStorage.setItem('lastActivity', Date.now());

        // 1. 操作を検知して時間を更新
        ['mousedown', 'keydown', 'touchstart'].forEach(event => {
            window.addEventListener(event, () => {
                localStorage.setItem('lastActivity', Date.now());
            });
        });

        // 2. 10分無操作なら自動ログアウト
        setInterval(() => {
            const lastActive = localStorage.getItem('lastActivity');
            if (Date.now() - lastActive > AUTO_LOGOUT_TIME) {
                alert("10分間操作がなかったため、自動ログアウトしました。");
                handleLogout();
            }
        }, 10000); // 10秒ごとに判定

        // 3. ハートビート：GAS側に「まだ使っています」と通知
        setInterval(async () => {
            const sid = localStorage.getItem('sessionId');
            if (sid) {
                try {
                    await fetch(`${GAS_URL}?action=heartbeat&sessionId=${sid}`);
                } catch(e) { console.error("Heartbeat failed"); }
            }
        }, HEARTBEAT_INTERVAL);
    }

    // ログアウト処理
    async function handleLogout() {
        const sid = localStorage.getItem('sessionId');
        if (sid) {
            // GAS側のセッション情報をクリア（非同期でOK）
            fetch(`${GAS_URL}?action=logout&sessionId=${sid}`).catch(()=>{});
        }
        localStorage.clear();
        location.reload();
    }
</script>

</body>
</html>
